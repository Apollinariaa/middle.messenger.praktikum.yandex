<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Авторизация</title>
  <link rel="stylesheet" crossorigin href="/assets/styles-2qk8jRFE.css">
  <link rel="stylesheet" crossorigin href="/assets/navButton-DNdYSd-V.css">
  <link rel="stylesheet" crossorigin href="/assets/line-DCG_Y3xn.css">
</head>

<body>
    <main class="auth-block block-blue">
        <h1 class="auth-block__title">Вход</h1>

        <form class="auth-block__form">

            <div class="auth-block__input-form">
                <div class="block-input">
                    <div class="block-input__wrapper">
                        <label class="block-input__label" for="login">Логин</label>
                        <input type="text"  name="login" class="block-input__field" placeholder="pochta@yandex.ru" >
                    </div>
                    <hr class="line" />
                </div>
                <div class="block-input">
                    <div class="block-input__wrapper">
                        <label class="block-input__label" for="password">Пароль</label>
                        <input type="text"  name="password" class="block-input__field" placeholder="•••••••••••" >
                    </div>
                    <hr class="line" />
                </div>
            </div>

            <div class="auth-block__submit">
                <button class="submit-button style-margin" type="submit" >Войти</button>
            </div>
            <div class="auth-block__submit">
                <button class="nav-button ">Нет аккаунта?</button>
            </div>

        </form>
    </main>
</body>

</html>
